<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — DirectRent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>* { font-family: 'Inter', sans-serif; } .card-hover{transition:all 0.3s;} .card-hover:hover{transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,0.1);}</style>
</head>
<body class="bg-gray-50">
  <nav class="bg-green-800 sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 lg:px-8 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3"><div class="w-9 h-9 bg-green-500 rounded-xl flex items-center justify-center"><i class="fa-solid fa-house text-white"></i></div><span class="text-white font-black text-lg">Direct<span class="text-green-300">Rent</span></span></a>
      <div class="hidden md:flex items-center gap-1">
        <a href="/pages/properties.html" class="text-gray-200 hover:text-white hover:bg-white/10 px-3 py-2 rounded-lg text-sm font-medium transition-all">Properties</a>
        <a href="/pages/lawyers.html" class="text-gray-200 hover:text-white hover:bg-white/10 px-3 py-2 rounded-lg text-sm font-medium transition-all">Lawyers</a>
        <a href="/pages/agents.html" class="text-gray-200 hover:text-white hover:bg-white/10 px-3 py-2 rounded-lg text-sm font-medium transition-all">Agents</a>
        <a href="/pages/blog.html" class="text-white bg-white/15 px-3 py-2 rounded-lg text-sm font-medium">Blog</a>
        <a href="/pages/support.html" class="text-gray-200 hover:text-white hover:bg-white/10 px-3 py-2 rounded-lg text-sm font-medium transition-all">Support</a>
      </div>
      <div id="nav-auth" class="flex items-center gap-2">
        <a href="/pages/login.html" class="text-gray-200 border border-white/30 px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-all">Sign In</a>
        <a href="/pages/register.html" class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-green-400 transition-all">Get Started</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="bg-gradient-to-r from-green-900 to-green-700 py-14 px-4 text-center">
    <div class="max-w-2xl mx-auto">
      <div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/20"><i class="fa-solid fa-newspaper text-white text-2xl"></i></div>
      <h1 class="text-4xl font-black text-white mb-3">DirectRent Blog</h1>
      <p class="text-green-200 text-base">Property tips, market insights, and rental guides for Nigerians</p>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-4 lg:px-8 py-12">
    <!-- Featured / latest post placeholder images -->
    <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="bg-white rounded-2xl overflow-hidden animate-pulse border border-gray-100 shadow-sm"><div class="h-48 bg-gray-200"></div><div class="p-5 space-y-2"><div class="h-3 bg-gray-200 rounded w-1/4"></div><div class="h-4 bg-gray-200 rounded w-3/4"></div><div class="h-3 bg-gray-200 rounded w-full"></div></div></div>
      <div class="bg-white rounded-2xl overflow-hidden animate-pulse border border-gray-100 shadow-sm"><div class="h-48 bg-gray-200"></div><div class="p-5 space-y-2"><div class="h-3 bg-gray-200 rounded w-1/4"></div><div class="h-4 bg-gray-200 rounded w-3/4"></div><div class="h-3 bg-gray-200 rounded w-full"></div></div></div>
      <div class="bg-white rounded-2xl overflow-hidden animate-pulse border border-gray-100 shadow-sm"><div class="h-48 bg-gray-200"></div><div class="p-5 space-y-2"><div class="h-3 bg-gray-200 rounded w-1/4"></div><div class="h-4 bg-gray-200 rounded w-3/4"></div><div class="h-3 bg-gray-200 rounded w-full"></div></div></div>
    </div>

    <!-- Newsletter CTA -->
    <div class="mt-16 bg-gradient-to-r from-green-800 to-green-600 rounded-3xl p-8 lg:p-12 text-center">
      <h3 class="text-2xl font-black text-white mb-2">Stay Updated</h3>
      <p class="text-green-200 mb-6">Get the latest property tips and market insights delivered to your inbox.</p>
      <div class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
        <input type="email" placeholder="your@email.com" class="flex-1 px-4 py-3 rounded-xl text-sm focus:outline-none font-medium">
        <button class="bg-white text-green-700 px-6 py-3 rounded-xl font-bold text-sm hover:bg-green-50 transition-all whitespace-nowrap">Subscribe</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const blogImages = ['https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=600&q=80','https://images.unsplash.com/photo-1582268611958-ebfd161ef9cf?w=600&q=80','https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=600&q=80','https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=600&q=80','https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=600&q=80','https://images.unsplash.com/photo-1523217582562-09d05606c584?w=600&q=80'];
    const user = getUser();
    if (user) document.getElementById('nav-auth').innerHTML = `<a href="${getDashboardLink(user.role)}" class="text-gray-200 hover:text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/10">${user.name.split(' ')[0]}</a><button onclick="logout()" class="bg-red-500/20 text-red-300 px-4 py-2 rounded-lg text-sm border border-red-500/30">Logout</button>`;

    async function loadBlog() {
      const grid = document.getElementById('blog-grid');
      try {
        const data = await api.get('/blog');
        const posts = data.posts || [];
        if (!posts.length) {
          grid.innerHTML = `
            <div class="col-span-3 text-center py-16">
              <div class="w-16 h-16 bg-green-50 rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-newspaper text-green-400 text-2xl"></i></div>
              <p class="text-gray-600 font-bold text-lg">No articles yet</p>
              <p class="text-gray-400 text-sm mt-1">Check back soon for property tips and insights</p>
            </div>`;
          return;
        }
        grid.innerHTML = posts.map((post, i) => {
          const date = new Date(post.created_at).toLocaleDateString('en-NG', {year:'numeric',month:'long',day:'numeric'});
          return `<div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 card-hover">
            <div class="h-48 overflow-hidden"><img src="${blogImages[i % blogImages.length]}" alt="${post.title}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-500" loading="lazy"></div>
            <div class="p-5">
              <div class="flex items-center gap-2 mb-3">
                <span class="bg-green-100 text-green-700 text-xs px-2.5 py-1 rounded-full font-bold">Property Tips</span>
                <span class="text-gray-400 text-xs">${date}</span>
              </div>
              <h3 class="font-black text-gray-800 text-base mb-2 leading-snug">${post.title}</h3>
              <p class="text-gray-500 text-sm leading-relaxed mb-4 line-clamp-3">${post.content}</p>
              <div class="flex items-center gap-2 pt-3 border-t border-gray-100">
                <div class="w-7 h-7 bg-green-100 rounded-full flex items-center justify-center"><i class="fa-solid fa-user text-green-600 text-xs"></i></div>
                <span class="text-xs text-gray-500 font-medium">DirectRent Team</span>
              </div>
            </div>
          </div>`;
        }).join('');
      } catch {
        grid.innerHTML = `<div class="col-span-3 text-center py-8 text-gray-500">Unable to load articles.</div>`;
      }
    }
    loadBlog();
  </script>
</body>
</html>
